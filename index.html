function lineColour(n) {
  if (!n) return '#1c4f8c';
  for (const k of Object.keys(LINE_COLOURS)) if (n.includes(k)) return LINE_COLOURS[k];
  return '#1c4f8c';
}

function cleanName(n) {
  if (!n) return '';
  n = n.replace(/ (Station|Light Rail|Wharf|Platform \d+)$/i,'').trim();
  return NAME_MAP[n] || n;
}

function nowTime() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function updateClocks() {
  ['clk-gps','clk-platform','clk-journey'].forEach(id => {

function countdown(depStr) {
  if (!depStr) return null;
  const secs = (new Date(depStr).getTime() - Date.now()) / 1000 - 20;
  if (secs < 0) return null;
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h > 0) return h + 'hr ' + m + 'm';
  if (m >= 1) return m + ' min';
  return '1 min';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

async function api(endpoint, params) {
  // Call our Netlify function which adds the auth header server-side
  const qs = new URLSearchParams({ endpoint, ...params }).toString();
  const r = await fetch(BASE + '?' + qs);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function distMetres(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function findNearbyStops(lat, lon) {
  return ALL_STATIONS
    .map(([name, id, sLat, sLon]) => ({ name, id, distance: distMetres(lat, lon, sLat, sLon) }))
    .sort((a, b) => a.distance - b.distance)
    .slice(0, 5);
}

async function getDepartures(stopId) {
  const now = new Date();
  const d = await api('departure_mon', {
    outputFormat:'rapidJSON', coordOutputFormat:'EPSG:4326',
    mode:'direct', type_dm:'stop', name_dm:stopId,
    depArrMacro:'dep',
    itdDate: now.toISOString().slice(0,10).replace(/-/g,''),
    itdTime: String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0'),
    TfNSWDM:'true', departureMonitorMacro:'true',
    version:'10.2.1.42'
  });
  return d.stopEvents || [];
}

// ---- GPS PICKER ----
function startGps() {
  if (!navigator.geolocation) { showPickerError('Geolocation not supported by your browser.'); return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    setPickerHtml('<div style="font-size:15px;color:#1a1a1a;margin-bottom:6px">Finding nearby stations...</div>');
    try {
      const stops = findNearbyStops(pos.coords.latitude, pos.coords.longitude);
      if (!stops.length) { showPickerError('No train stations found nearby. Are you at a train station?'); return; }
      renderPicker(stops);
    } catch(e) { showPickerError('Could not find nearby stations: ' + e.message); }
  }, err => {
    showPickerError(err.code===1
      ? 'Location access denied. Enable it in your browser settings and reload.'
      : 'Could not get your location. Try again.');
  }, { enableHighAccuracy:true, timeout:12000 });
}

function setPickerHtml(html) { document.getElementById('picker-content').innerHTML = html; }

function showPickerError(msg) {
  setPickerHtml(`
    <div class="error-msg">${msg}</div>
    <button class="retry-btn" onclick="startGps()" style="margin-bottom:16px">Try GPS again</button>
    <div style="margin-top:8px;margin-bottom:10px;font-size:14px;color:#1a1a1a;font-weight:700">Or search for your station:</div>
    ${searchBoxHtml()}
  `);
}

function searchBoxHtml() {
  return `<div>
    <input id="station-search" type="text" placeholder="Type a station name..." autocomplete="off"
      style="width:100%;padding:12px 14px;font-size:16px;font-family:'Public Sans',sans-serif;border:2px solid #1c4f8c;border-radius:4px;background:#fff;color:#1a1a1a;outline:none"
      oninput="searchStations(this.value)">
    <div id="search-results" style="margin-top:8px"></div>
  </div>`;
}

function searchStations(query) {
  const resultsEl = document.getElementById('search-results');
  if (!resultsEl) return;
  if (!query || query.length < 1) { resultsEl.innerHTML = ''; return; }
  const q = query.toLowerCase();
  const matches = ALL_STATIONS
    .filter(([name]) => name.toLowerCase().includes(q))
    .slice(0, 8);
  if (!matches.length) {
    resultsEl.innerHTML = '<div style="font-size:13px;color:#666;padding:8px 0">No stations found.</div>';
    return;
  }
  resultsEl.innerHTML = matches.map(([name, id]) => {
    const safeId = id.replace(/'/g,"\\'");
    const safeName = name.replace(/'/g,"\\'");
    return `<button class="stop-btn" onclick="selectStop('${safeId}','${safeName}')">${name}</button>`;
  }).join('');
}

function renderPicker(stops) {
  let html = '<div style="font-size:15px;color:#1a1a1a;margin-bottom:14px">Select your station:</div>';
  stops.forEach(stop => {
    const id = stop.id.replace(/'/g,"\\'");
    const name = stop.name || 'Unknown station';
    const safeName = name.replace(/'/g,"\\'");
    const dist = stop.distance ? Math.round(stop.distance)+'m away' : '';
    html += `<button class="stop-btn" onclick="selectStop('${id}','${name}')">
      ${name}${dist?`<span class="stop-sub">${dist}</span>`:''}
    </button>`;
  });
  html += `<div style="margin-top:16px;border-top:1px solid #8aaac8;padding-top:16px">
    <div style="font-size:13px;color:#444;margin-bottom:10px">Not your station?</div>
    ${searchBoxHtml()}
  </div>`;
  setPickerHtml(html);
}

async function selectStop(id, name) {
  state.stopId = id; state.stopName = name;
  showScreen('platform');
  await loadDepartures();
  state.refreshTimer = setInterval(loadDepartures, 30000);
  state.cdTimer = setInterval(updateCd, 1000);
}

function carIcon(bg) {
  const fc = bg==='#e8a800'?'#1a1a1a':'#fff';
  return `<svg viewBox="0 0 13 13"><circle cx="3.5" cy="4" r="1.8" fill="${fc}"/><path d="M0.5 12c0-2 1.2-3.5 3-3.5s3 1.5 3 3.5" stroke="${fc}" stroke-width="1" fill="none"/><circle cx="9.5" cy="4" r="1.8" fill="${fc}"/><path d="M6.5 12c0-2 1.2-3.5 3-3.5s3 1.5 3 3.5" stroke="${fc}" stroke-width="1" fill="none"/></svg>`;
}

function capBar(n) {
  const colours = Array(n||8).fill('#4caf50');
  const nums = colours.map((_,i) => `<div class="cap-num">${colours.length-i}</div>`).join('');
  const cars = colours.map(c => `<div class="car" style="background:${c}">${carIcon(c)}</div>`).join('');
  return `<div class="cap-nums">${nums}</div><div class="cap-bar">${cars}</div>`;
}

function parseService(e) {
  const t = e.transportation || {};
  const depStr = e.departureTimeEstimated || e.departureTimePlanned;
  const lineName = (t.disassembledName || t.name || '').replace(/ Line$/,'').trim();
  const dest = cleanName(t.destination?.name || '');
  const via = t.properties?.WheelchairAccess || '';
  const platform = e.location?.properties?.platformName ||
    e.location?.properties?.platform || e.location?.platform || '';
  const stops = (e.onwardLocations || []).map(s => cleanName(s.disassembledName || s.name || '')).filter(Boolean);
  const cars = t.properties?.RealtimeTripId ? null : null;
  const isLimited = (t.name||'').toLowerCase().includes('express') || (t.name||'').toLowerCase().includes('limited');
  return { lineName, dest, via, platform, depStr, stops, cars, isLimited };
}

async function loadDepartures() {
  try {
    const raw = await api('departure_mon', {
      outputFormat:'rapidJSON', coordOutputFormat:'EPSG:4326',
      mode:'direct', type_dm:'stop', name_dm: state.stopId,
      depArrMacro:'dep',
      itdDate: (() => { const n=new Date(); return n.getFullYear()+String(n.getMonth()+1).padStart(2,'0')+String(n.getDate()).padStart(2,'0'); })(),
      itdTime: (() => { const n=new Date(); return String(n.getHours()).padStart(2,'0')+String(n.getMinutes()).padStart(2,'0'); })(),
      TfNSWDM:'true', departureMonitorMacro:'true', version:'10.2.1.42'
    });

    // Debug: show raw response keys on screen temporarily
    const keys = Object.keys(raw || {});
    const eventCount = (raw.stopEvents||raw.departures||raw.events||[]).length;
    const events = raw.stopEvents || raw.departures || raw.events || [];

    if (!events.length) {
      const errDetail = raw.ErrorDetails ? JSON.stringify(raw.ErrorDetails).slice(0,200) : 'none';
      document.getElementById('platform-content').innerHTML =
        `<div class="msg">No services returned.<br><small style="color:#888">Keys: ${keys.join(', ')}<br>Error: ${errDetail}</small><br><br>
        <button class="retry-btn" style="font-size:13px;padding:10px" onclick="loadDepartures()">Try again</button></div>`;
      return;
    }

    const now = Date.now();
    const filtered = events
      .filter(e => {
        const dep = e.departureTimeEstimated || e.departureTimePlanned;
        return dep && new Date(dep).getTime() > now - 120000;
      })
      .slice(0, 3);
    state.services = filtered.map(parseService);
    renderPlatform();
  } catch(e) {
    document.getElementById('platform-content').innerHTML =
      `<div class="msg">Could not load departures.<br><small style="color:#c0392b">${e.message}</small><br><br>
      <button class="retry-btn" style="font-size:13px;padding:10px" onclick="loadDepartures()">Try again</button></div>`;
  }
}

function renderPlatform() {
  if (!state.services.length) {
    document.getElementById('platform-content').innerHTML =
      '<div class="msg">No upcoming services found.</div>';
    return;
  }

  const s = state.services[0];
  const col = lineColour(s.lineName);
  document.getElementById('platform-hdr').style.background = col;

  const stopList = s.stops.slice(0,9).map(st => `<div>${st}</div>`).join('') ||
    '<div style="color:#888;font-size:14px">Loading stops...</div>';

  const badge = s.isLimited ? 'Limited Stops' : 'All Stops';

  let followHtml = '';
  if (state.services.length > 1) {
    followHtml = '<hr class="divider"><div class="fol-lbl">Following Services</div>';
    state.services.slice(1).forEach(f => {
      const fcd = countdown(f.depStr);
      const fcol = lineColour(f.lineName);
      followHtml += `<div class="fol-row">
        <div>
          <div class="fol-dest">${f.dest}</div>
          <div class="fol-via"><span class="badge" style="font-size:10px;padding:2px 5px;background:${fcol}">${f.lineName||'T'}</span></div>
        </div>
        <div class="fol-meta">
          <div class="fl">Platform</div><div class="fv">${f.platform||'?'}</div>
          <div class="fl">Departs</div><div class="fv">${fcd||'--'}</div>
        </div>
      </div>`;
    });
  }

  document.getElementById('platform-content').innerHTML = `
    <div class="main">
      <div class="line-row">
        <div class="pill" style="background:${col}">${s.lineName||'T'}</div>
        <div>
          <div class="dest">${s.dest}</div>
          ${s.via ? `<div class="via">${s.via}</div>` : ''}
        </div>
      </div>
      ${capBar(s.cars)}
      <div class="stops-row">
        <div class="stops">${stopList}</div>
        <div class="plat-col">
          <div class="plat-lbl">Platform</div>
          <div class="plat-num">${s.platform||'?'}</div>
          <div class="dep-lbl">Departs</div>
          <div class="dep-time" id="main-cd">${countdown(s.depStr)||'--'}</div>
        </div>
      </div>
      <div class="badges"><span class="badge">${badge}</span></div>
      ${followHtml}
    </div>
    <button class="big-btn" style="background:${col}" onclick="boardTrain()">Boarded -- track my journey</button>
    <button class="outline-btn" onclick="resetToGps()">Change station</button>
  `;
}

function updateCd() {
  const el = document.getElementById('main-cd');
  if (el && state.services[0]) el.textContent = countdown(state.services[0].depStr) || 'Departing';
}

// ---- JOURNEY ----
function boardTrain() {
  const s = state.services[0];
  state.boardedService = s;
  state.journeyStops = s.stops.length ? s.stops : [s.dest];
  state.currentIdx = 0;
  clearInterval(state.refreshTimer);
  clearInterval(state.cdTimer);
  const col = lineColour(s.lineName);
  document.getElementById('journey-hdr').style.background = col;
  showScreen('journey');
  renderJourney();

  if (navigator.geolocation) {
    state.gpsWatch = navigator.geolocation.watchPosition(() => {}, null, { enableHighAccuracy:true, maximumAge:15000 });
  }
}

function renderJourney() {
  const s = state.boardedService;
  const stops = state.journeyStops;
  const idx = state.currentIdx;
  const col = lineColour(s.lineName);
  const current = stops[idx] || s.dest;
  const next = idx < stops.length - 1 ? stops[idx+1] : 'Final stop';

  const prog = stops.map((st, i) => {
    const passed = i < idx, isCur = i === idx;
    const dSz = isCur ? 16 : 10;
    const dBg = isCur ? '#1a1a1a' : passed ? col : '#8aaac8';
    const nCol = isCur ? '#1a1a1a' : passed ? col : '#777';
    const nFw = isCur ? '700' : '400';
    const lBg = passed ? col : '#8aaac8';
    const short = st.length > 9 ? st.replace(' Station','').replace('Junction','Jn') : st;
    return `<div class="p-stop">
      <div style="width:${dSz}px;height:${dSz}px;border-radius:50%;background:${dBg};flex-shrink:0"></div>
      <div class="p-name" style="color:${nCol};font-weight:${nFw}">${short}</div>
    </div>${i<stops.length-1?`<div class="p-line" style="background:${lBg}"></div>`:''}`;
  }).join('');

  document.getElementById('journey-content').innerHTML = `
    <div class="line-row" style="margin-bottom:14px">
      <div class="pill" style="background:${col}">${s.lineName||'T'}</div>
      <div>
        <div style="font-size:13px;color:#444">to ${s.dest}</div>
      </div>
    </div>
    <div class="j-lbl">Now at</div>
    <div class="j-station">${current}</div>
    <hr class="divider">
    <div class="j-lbl">Next stop</div>
    <div class="j-next" style="color:${col}">${next}</div>
    <div class="prog-wrap">${prog}</div>
    <div class="gps-tag" style="color:#2e7d32">GPS tracking active</div>
    <button class="big-btn" style="background:#1a1a1a;margin-top:16px" onclick="alightTrain()">Alight at this station</button>
    <button class="outline-btn" style="margin-top:8px" onclick="alightTrain()">Back to platform view</button>
  `;
}

function alightTrain() {
  if (state.gpsWatch) navigator.geolocation.clearWatch(state.gpsWatch);
  state.boardedService = null; state.journeyStops = []; state.currentIdx = 0;
  showScreen('platform');
  loadDepartures();
  state.refreshTimer = setInterval(loadDepartures, 30000);
  state.cdTimer = setInterval(updateCd, 1000);
}

function resetToGps() {
  clearInterval(state.refreshTimer); clearInterval(state.cdTimer);
  state.stopId = null; state.stopName = null; state.services = [];
  setPickerHtml(`
    <div style="font-size:15px;color:#1a1a1a;margin-bottom:6px">Finding your location...</div>
    <div style="font-size:12px;color:#444;margin-bottom:16px">Allow location access when prompted.</div>
    <div style="border-top:1px solid #8aaac8;padding-top:16px">
      <div style="font-size:13px;color:#444;margin-bottom:10px">Or search manually:</div>
      ${searchBoxHtml()}
    </div>
  `);
  showScreen('gps');
  startGps();
}

startGps();
</script>
</body>
</html>
